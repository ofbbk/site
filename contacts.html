    <section id="about_section">
      
        <main class="flex-center about">

              <form id="form1" class="mainform" action="https://formspree.io/f/form1" method="POST">
                <label for="name">Имя</label>
                <input type="text" id="name" name="Имя" value="" placeholder="Ваше имя.." required>

                <label for="from">Почта</label>
                <input type="text" id="from" name="Адрес" value="" placeholder="Адрес Вашей электронной почты.." required>

                <label for="message">Сообщение</label>

              </form>

          </div>
        </main>


        
          <main class="flex-center about">
            <div class="about">
              <a href="mailto:y.kuz@icloud.com?subject=Видеомонтаж или написание музыки" class="button">Связаться</a>
            </div>


        </section>
        <script>
          window.onload = function() {
            let location = window.location.href;
            var elements = document.getElementsByClassName('nav');
            for (let elem of elements) {
              if (elem == location) {
                document.getElementById(elem.id).classList.add("active");
              } else {
                elem.classList.remove('active');
              }
            }
          }
        </script>
                       
        </body>
