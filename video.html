</head>

<body>
  <iframe src="header.html" onload="this.before((this.contentDocument.body||this.contentDocument).children[0]);this.remove()"></iframe>
<title>Юра Кузнецов.Видео</title>

    <section id="video_section">
      <main class="flex-center">
        <div style="max-width: 500px;">
          <p></p>
            <p>Я монтирую видео. Эксперт в звуке и музыке.</p>
            <p>Монтирую с особым вниманием к темпу, ритму, драматургии.</p>
            <p>Эрудиция помогает вникать в самые разные темы.</p>
            <p>Делаю обстоятельно, как для себя.</p>
            <p>Наа выходе — ёмкий, вкусный, захватывающий ролик.</p>
          <div>
      </main>

      <main class="flex-center">
          <iframe width="560" height="315" src="https://www.youtube.com/embed/videoseries?list=PLUl8BQZrBudOaEtQL3KvqJBTVGj38AENQ" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
          </main>

        </section>
        <script>
          window.onload = function() {
            let location = window.location.href;
            var elements = document.getElementsByClassName('nav');
            for (let elem of elements) {
              if (elem == location) {
                document.getElementById(elem.id).classList.add("active");
              } else {
                elem.classList.remove('active');
              }
            }
          }
        </script>
               
</body>
